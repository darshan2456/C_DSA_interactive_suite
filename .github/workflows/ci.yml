name: DSA test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install -y build-essential valgrind

      - name: Run tests
        run: make test

      - name: Memory check with valgrind
        run: make valgrind
